# MEDIA! — self-hosted movie & TV streaming server.
#
# Quick start:
#   1. docker compose up -d
#   2. Open http://localhost:8096 and add libraries in Settings.
#
# Update:
#   docker compose pull && docker compose up -d
#
services:
  media:
    # Prebuilt image (recommended). To build from source instead, comment out
    # `image:` and uncomment `build: .`.
    image: ghcr.io/gabenunez/media-app:latest
    # build: .
    container_name: media
    restart: unless-stopped
    ports:
      - "8096:8096"
    environment:
      # Optional — you can also set these later in the web UI (/settings).
      TMDB_API_KEY: "${TMDB_API_KEY:-}"
      OPENSUBTITLES_API_KEY: "${OPENSUBTITLES_API_KEY:-}"
      MEDIA_LANGUAGE: "en-US"
    volumes:
      # Config (config.yaml) and app state (database, artwork, transcode cache).
      - ./config:/config
      - ./data:/data
      # Your media. Mount read-only; the container path (left of ":" after the
      # host path) is what you enter as the library path in Settings.
      # Example — edit host paths to match your system:
      - /path/to/movies:/media/movies:ro
      - /path/to/tv:/media/tv:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8096/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
